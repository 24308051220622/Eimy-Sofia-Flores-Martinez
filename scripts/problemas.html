<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Problemas</title>

    <style>

        body{
            margin: 0;
            padding: 10px;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to bottom right, #1E3A5F, #3F72AF);
            min-height: 100vh;
        }

        .contenedor{
            width: 100%;
            text-align: center;
        }

        h1{
            color: white;
            font-size: 55px;
            margin-top: 20px;
            margin-bottom: 80px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
        }

        .botones{
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            width: 95%;
            margin: auto;
        }

        a{
            text-decoration: none;
        }

        button{
            width: 100%;
            padding: 22px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(to right, #1E3A5F, #4A90E2);
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.35);
        }

        button:hover{
            transform: scale(1.05);
            background: linear-gradient(to right, #4A90E2, #6FA8FF);
        }

        /* Imagen más pequeña */
        .imagen{
            margin-top: 50px;
            text-align: center;
        }

        .imagen img{
            width: 350px;
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.3);
        }

    </style>

</head>
<body>
