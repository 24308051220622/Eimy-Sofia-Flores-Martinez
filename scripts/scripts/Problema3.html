<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago de Artículos</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to bottom right, #1E3A5F, #3F72AF);
            margin: 0;
        }

        

        .navbar{
            width: 100%;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(10px);

            display: flex;
            justify-content: center;
            align-items: center;

            gap: 8px;

            padding: 15px 5px;

            box-sizing: border-box;
        }

        .navbar a{

            color: white;
            text-decoration: none;

            font-size: 14px;
            font-weight: bold;

            padding: 10px 12px;

            border-radius: 10px;

            transition: 0.3s;
        }

        .navbar a:hover{

            background-color: rgba(255,255,255,0.15);

            transform: scale(1.05);
        }

        .navbar .activo{

            background: linear-gradient(to right, #1E3A5F, #4A90E2);

            box-shadow: 0px 3px 10px rgba(0,0,0,0.3);
        }

        .navbar .inicio{

            font-size: 16px;
        }

       

        .principal{
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 80px);
        }

        .contenedor{
            background-color: white;
            padding: 35px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1{
            color: #1E3A5F;
            margin-bottom: 25px;
        }

        label{
            font-size: 18px;
            font-weight: bold;
            color: #1E3A5F;
        }

        input{
            width: 90%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 2px solid #3F72AF;
            font-size: 16px;
        }

        button{
            background: linear-gradient(to right, #1E3A5F, #4A90E2);
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            transform: scale(1.05);
        }

        #resultado{
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #1E3A5F;
        }

    </style>

</head>
<body>

    

    <div class="navbar">

        <a href="../problemas.html" class="inicio">🏠 Inicio</a>

        <a href="Problema1.html">Problema 1</a>

        <a href="Problema2.html">Problema 2</a>

        <a href="Problema3.html" class="activo">
            Problema 3
        </a>

        <a href="Problema4.html">Problema 4</a>

        <a href="Problema5.html">Problema 5</a>

        <a href="Problema6.html">Problema 6</a>

        <a href="Problema7.html">Problema 7</a>

        <a href="Problema8.html">Problema 8</a>

        <a href="Problema9.html">Problema 9</a>

        <a href="Problema10.html">Problema 10</a>

    </div>


    <div class="principal">

        <div class="contenedor">

            <h1>Pago de Artículos</h1>

            <label for="precio">
                Precio del artículo:
            </label><br>

            <input type="text" id="precio"><br>

            <label for="desc">
                Descuento:
            </label><br>

            <input type="text" id="desc"><br>

            <label for="iva">
                IVA:
            </label><br>

            <input type="text" id="iva"><br>

            <button onclick="calcularPago()">
                Calcular Precio Final
            </button>

            <p id="resultado"></p>

        </div>

    </div>
  <script src="Problema3.js"></script>

</body>
</html>
