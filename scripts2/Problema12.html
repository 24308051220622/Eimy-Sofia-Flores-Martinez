<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problema 12</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to bottom right, #2B124C, #522B5B, #854F6C);
            margin: 0;
        }

        .navbar{
            width: 100%;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(10px);

            display: flex;
            justify-content: center;
            align-items: center;

            gap: 8px;

            padding: 15px 5px;

            box-sizing: border-box;
        }

        .navbar a{

            color: white;
            text-decoration: none;

            font-size: 14px;
            font-weight: bold;

            padding: 10px 12px;

            border-radius: 10px;

            transition: 0.3s;
        }

        .navbar a:hover{

            background-color: rgba(255,255,255,0.15);

            transform: scale(1.05);
        }

        .navbar .activo{

            background: linear-gradient(to right, #5C2E7E, #9D4EDD);

            box-shadow: 0px 3px 10px rgba(0,0,0,0.3);
        }

        .navbar .inicio{
            font-size: 16px;
        }

        .principal{
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 80px);
        }

        .contenedor{
            background-color: white;
            padding: 35px;
            border-radius: 20px;
            width: 420px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1{
            color: #5C2E7E;
            margin-bottom: 25px;
        }

        label{
            font-size: 18px;
            font-weight: bold;
            color: #5C2E7E;
        }

        input{
            width: 90%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 2px solid #9D4EDD;
            font-size: 16px;
        }

        button{
            background: linear-gradient(to right, #5C2E7E, #9D4EDD);
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            transform: scale(1.05);
        }

        #resultado{
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #5C2E7E;
        }

    </style>

</head>

    <div class="principal">

        <div class="contenedor">

            <h1>Sueldo Semanal</h1>

            <label for="horas">
                Horas trabajadas:
            </label><br>

            <input type="text" id="horas"><br>

            <label for="pago">
                Pago por hora:
            </label><br>

            <input type="text" id="pago"><br>
